<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Portfolio Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; padding: 2rem; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { margin-top: 0; color: #0f172a; text-align: center; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input, textarea { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        textarea { height: 250px; resize: vertical; }
        button { background: #06b6d4; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%; font-size: 1.1rem; transition: background 0.2s; }
        button:hover { background: #0891b2; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        #status { margin-top: 1rem; text-align: center; font-weight: 500; }
        .error { color: #ef4444; }
        .success { color: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Portfolio Generator</h1>
        <form id="portfolioForm">
            <div class="form-group">
                <label>GitHub Username</label>
                <input type="text" id="username" value="Jabtwin" required>
            </div>
            <div class="form-group">
                <label>GitHub Token</label>
                <input type="password" id="githubToken" placeholder="ghp_..." required>
            </div>
            <div class="form-group">
                <label>Gemini API Key</label>
                <input type="password" id="geminiKey" placeholder="AIzaSy..." required>
            </div>
            <div class="form-group">
                <label>Job Description</label>
                <textarea id="jd" required></textarea>
            </div>
            <button type="submit" id="submitBtn">Generate PDF</button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        fetch('/sample-jd.txt')
            .then(res => res.text())
            .then(text => document.getElementById('jd').value = text)
            .catch(() => {});

        document.getElementById('portfolioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.textContent = 'Generating (this may take 15-30s)...';
            status.textContent = '';
            status.className = '';

            const data = {
                username: document.getElementById('username').value,
                githubToken: document.getElementById('githubToken').value,
                geminiKey: document.getElementById('geminiKey').value,
                jd: document.getElementById('jd').value,
            };

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    const errorMsg = await response.text();
                    throw new Error(errorMsg || 'Failed to generate PDF');
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${data.username}_Portfolio.pdf`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);

                status.textContent = 'PDF generated and downloaded successfully!';
                status.className = 'success';
            } catch (err) {
                status.textContent = 'Error: ' + err.message;
                status.className = 'error';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Generate PDF';
            }
        });
    </script>
</body>
</html>
